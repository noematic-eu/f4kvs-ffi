# ============================================================================
# Integration Tests
# ============================================================================
[[test]]
name = "lockfree_integration_tests"
path = "tests/lockfree_integration_tests.rs"

[[test]]
name = "simd_integration_tests"
path = "tests/simd_integration_tests.rs"

[[test]]
name = "storage_backend_integration_tests"
path = "tests/storage_backend_integration_tests.rs"

[[test]]
name = "memory_pool_integration_tests"
path = "tests/memory_pool_integration_tests.rs"

[[test]]
name = "ffi_integration_tests"
path = "tests/ffi_integration_tests.rs"

# ============================================================================
# Fuzzing Configuration
# ============================================================================
[package.metadata.fuzz]
targets = ["key_operations", "value_operations", "storage_operations"]
# Note: Fuzz targets are handled by the separate fuzz workspace

[lints]
workspace = true